<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphabet Lernen</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        height: 100vh;
        background: #f5f5f5;
        font-family: Arial, sans-serif;
    }

.alphabet {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 6px;
    width: 100vw;
    height: 100vh;
    padding: 6px;
}

.letter {
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border-radius: 18px;
    font-size: 6.5rem;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: 0.15s;
}

    .letter:active {
        transform: scale(0.95);
        background: #dbeafe;
    }
</style>
</head>
<body>

<div class="alphabet" id="alphabet"></div>

<script>
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const container = document.getElementById("alphabet");

let selectedVoice = null;

// Stimmen laden (wichtig für iPad: async!)
function loadVoices() {
    const voices = speechSynthesis.getVoices();

    console.log("Verfügbare Stimmen:");
    console.log(voices.map(v => v.name));

    // Priorität: Petra → Anna → irgendein Deutsch
    selectedVoice =
        voices.find(v => v.name.toLowerCase().includes("petra")) ||
        voices.find(v => v.name.toLowerCase().includes("anna")) ||
        voices.find(v => v.lang === "de-DE") ||
        voices.find(v => v.lang.startsWith("de")) ||
        null;

    console.log("Gewählte Stimme:", selectedVoice?.name || "keine");
}

// iOS braucht das Event (sonst kommt oft nichts)
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// Buchstaben erzeugen
alphabet.split("").forEach(letter => {
    const btn = document.createElement("div");
    btn.className = "letter";
    btn.textContent = letter;

    btn.addEventListener("click", () => {
        const speech = new SpeechSynthesisUtterance();

        // WICHTIG: einzeln buchstabieren statt Wort
        speech.text = letter.toLowerCase();

        if (selectedVoice) {
            speech.voice = selectedVoice;
        }

        speech.lang = "de-DE";
        speech.rate = 0.55;
        speech.pitch = 1.05;
        speech.volume = 1;

        speechSynthesis.cancel();
        speechSynthesis.speak(speech);
    });

    container.appendChild(btn);
});
</script>

</body>
</html>
